# This workflow will build a .NET Framework project

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest   # ✅ FIXED (must be Windows)

    steps:
    - uses: actions/checkout@v4

    # Setup MSBuild for .NET Framework
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Restore NuGet packages
    - name: Restore dependencies
      run: nuget restore

    # Build project
    - name: Build
      run: msbuild CyberChatbot.csproj /p:Configuration=Release

    # Run tests (only if you actually have tests)
    - name: Test
      run: echo "No test project found"
