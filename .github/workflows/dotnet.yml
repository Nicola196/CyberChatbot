name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./CyberChatbot   # ✅ FIXED PATH

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: nuget restore

    - name: Build
      run: msbuild CyberChatbot.csproj /p:Configuration=Release

    - name: Test
      run: echo "No tests configured"
